<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserindo Ícone em HTML</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <h1>Inserindo Ícone em HTML</h1>
    <p>Para inserir ícones em HTML basta colocar a tag link em head e em href colocar o local de armazenamento do ícone.
    <br>Um bom site para criar ícones é o favicon.cc. 
    <br>É preferível utilizar arquivos .ico.
    <br>O ícone aparece do lado do nome do site (na aba do navegador).</p>
</body>
</html>
