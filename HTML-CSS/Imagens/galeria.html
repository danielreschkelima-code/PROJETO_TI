<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Temática</title>
</head>

<body>
    <h1>GALERIA DE IMAGENS</h1>
    <img src="https://img.freepik.com/vetores-premium/uma-estrela-amarela-com-fundo-laranja_391639-3204.jpg?semt=ais_hybrid&w=740"
    alt=""
    width="100"
    height="100">
    <!-- Esta imagem é decorativa pois não possue nenhum valor informacional: ela serve apenas para a estética, ainda que feia, da página-->

    
    <figure>
        <img src="https://forbes.com.br/wp-content/uploads/2025/05/forbes-lady-gaga-show-768x512.jpg" 
        alt="Lady Gaga, a maioral em uma pose babilônica."
        width="100"
        height="400"
        title="Lady Gaga">
    </figure>
    
    <hr>

    <figure>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSUEkRc_z-bdhr4Ip3U0O2XHi3kRCNWPzEO3w&s" 
        alt="Melanie Martinez em uma pose autêntica."
        width="400"
        height="1200"
        title="Melanie Martinez">
    </figure>

    <hr>

    <figure>
        <img src="https://novabrasilfm.com.br/app/uploads/2025/02/chitaozinho-e-xororo.jpg" 
        alt="Chitãozinho e Xororó, uma dupla sertenejo em seu caráter clássico."
        width="400"
        height="700"
        title="Chitãozinho e Xororó">
    </figure>

    <hr>

    <figure>
        <img src="https://static.wikia.nocookie.net/disney/images/f/fe/Aurora_Stavernfestivalen_2018_%28191706%29_%28cropped%29.jpg/revision/latest?cb=20191126211222&path-prefix=pt-br" 
        alt="Aurora segurando um microfone e cantando angelicalmente."
        width="400"
        height="4500"
        title="AURORA">
    </figure>

    <!-- O elemento <figure> foi usado para transformar partes do texto em figuras não textuais, elas, assim sendo, poderiam muito bem ter sido aclopadas com suas legendas pertinentes -->

    <hr>
    <p>*As imagens foram distorcidas proprocitalmente ao encontro do humor.</p>
    <p><a href ="https://developer.mozilla.org/pt-BR/docs/Learn_web_development/Core/Structuring_content/HTML_images" title="Artigo oficial do MDN" target="_blank">Aprenda mais sobre imagens em HTML.</a>
    
    <!-- _blak = outra guia --> 
    
</body>
</html>
